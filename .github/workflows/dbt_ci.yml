name: dbt CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  dbt-build:
    runs-on: ubuntu-latest

    env:
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dbt
        run: pip install dbt-snowflake

      - name: Create dbt profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat <<EOF > ~/.dbt/profiles.yml
          modern_retail:
            target: prod
            outputs:
              prod:
                type: snowflake
                account: BCQSCMN-MS67180
                user: PRAVEENPAULLXYZ
                password: ${SNOWFLAKE_PASSWORD}
                role: SYSADMIN
                database: DBT_DB
                warehouse: DBT_WH
                schema: DBT_PROD_SCHEMA
                threads: 4
          EOF

      - name: Run dbt deps
        run: |
          cd dbt_project/modern_retail
          dbt deps

      - name: Run dbt build (prod validation)
        run: |
          cd dbt_project/modern_retail
          dbt build --target prod