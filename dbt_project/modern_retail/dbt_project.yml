name: modern_retail
version: '1.0'
config-version: 2

profile: modern_retail

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
snapshot-paths: ["snapshots"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  modern_retail:
    staging:
      +materialized: view

    intermediate:
      +materialized: view

    marts:
      core:
        +materialized: table

      finance:
        +materialized: incremental
